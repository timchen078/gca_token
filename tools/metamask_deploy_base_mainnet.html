<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deploy GCA Mainnet</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d1117;
        color: #e6edf3;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 780px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        color: #9da7b3;
        line-height: 1.5;
      }

      .warning {
        border: 1px solid #f85149;
        border-radius: 6px;
        padding: 12px 14px;
        color: #ffdcd7;
        background: #2d1111;
      }

      button,
      input {
        border-radius: 6px;
        font: inherit;
      }

      button {
        border: 0;
        padding: 12px 16px;
        margin-right: 8px;
        color: #061018;
        background: #58a6ff;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      input {
        width: min(100%, 280px);
        border: 1px solid #30363d;
        padding: 11px 12px;
        color: #e6edf3;
        background: #161b22;
      }

      code,
      pre {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
      }

      code {
        padding: 2px 5px;
      }

      pre {
        min-height: 180px;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Deploy GCA Mainnet</h1>
      <p class="warning">
        MAINNET deployment. This page deploys the fixed-supply GCA contract through MetaMask on
        Base Mainnet only, chain ID <code>8453</code>. This uses real ETH for gas and cannot be undone.
      </p>

      <p>
        Confirm the deployment target by typing <code>DEPLOY GCA MAINNET</code>.
      </p>
      <p>
        <input id="confirmation" type="text" oninput="updateDeployButton()" autocomplete="off" />
      </p>

      <p>
        <button id="connect" type="button" onclick="connectWallet()">Connect MetaMask</button>
        <button id="deploy" type="button" onclick="deployToken()" disabled>Deploy GCA Mainnet</button>
        <button id="watch" type="button" onclick="watchGcaToken()" disabled>Add GCA to MetaMask</button>
      </p>

      <pre id="log">Ready.</pre>
    </main>

    <script>
      const BASE_MAINNET_CHAIN_ID = "0x2105";
      const BASE_MAINNET_PARAMS = {
        chainId: BASE_MAINNET_CHAIN_ID,
        chainName: "Base Mainnet",
        nativeCurrency: { name: "Ether", symbol: "ETH", decimals: 18 },
        rpcUrls: ["https://mainnet.base.org"],
        blockExplorerUrls: ["https://basescan.org"],
      };
      const CONFIRMATION_PHRASE = "DEPLOY GCA MAINNET";

      const confirmationInput = document.getElementById("confirmation");
      const deployButton = document.getElementById("deploy");
      const watchButton = document.getElementById("watch");
      const logElement = document.getElementById("log");
      let account = null;
      let artifact = null;
      let provider = null;
      let deployedContractAddress = null;

      function log(message) {
        logElement.textContent += `\n${message}`;
      }

      function sleep(milliseconds) {
        return new Promise((resolve) => setTimeout(resolve, milliseconds));
      }

      function formatEth(hexWei) {
        const wei = BigInt(hexWei);
        const whole = wei / 10n ** 18n;
        const fraction = (wei % 10n ** 18n).toString().padStart(18, "0").slice(0, 6);
        return `${whole}.${fraction} ETH`;
      }

      function updateDeployButton() {
        deployButton.disabled = !account || !artifact || confirmationInput.value !== CONFIRMATION_PHRASE;
      }

      async function discoverMetaMaskProvider() {
        const announced = [];
        function onAnnouncement(event) {
          announced.push(event.detail);
        }

        window.addEventListener("eip6963:announceProvider", onAnnouncement);
        window.dispatchEvent(new Event("eip6963:requestProvider"));
        await new Promise((resolve) => setTimeout(resolve, 500));
        window.removeEventListener("eip6963:announceProvider", onAnnouncement);

        for (const detail of announced) {
          const info = detail.info || {};
          log(`Wallet provider: ${info.name || "unknown"} ${info.rdns || ""}`.trim());
        }

        const metaMaskAnnouncement = announced.find((detail) => {
          const info = detail.info || {};
          return info.rdns === "io.metamask" || info.name === "MetaMask";
        });
        if (metaMaskAnnouncement) {
          return metaMaskAnnouncement.provider;
        }

        if (!window.ethereum) {
          return null;
        }

        if (Array.isArray(window.ethereum.providers)) {
          return window.ethereum.providers.find((wallet) => wallet.isMetaMask && !wallet.isCoinbaseWallet) || null;
        }

        return window.ethereum.isMetaMask ? window.ethereum : null;
      }

      async function ensureBaseMainnet() {
        const chainId = await provider.request({ method: "eth_chainId" });
        if (chainId === BASE_MAINNET_CHAIN_ID) {
          return;
        }

        try {
          await provider.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: BASE_MAINNET_CHAIN_ID }],
          });
        } catch (error) {
          if (error.code !== 4902) {
            throw error;
          }

          await provider.request({
            method: "wallet_addEthereumChain",
            params: [BASE_MAINNET_PARAMS],
          });
        }

        const switchedChainId = await provider.request({ method: "eth_chainId" });
        if (switchedChainId !== BASE_MAINNET_CHAIN_ID) {
          throw new Error(`Wrong chain: ${switchedChainId}`);
        }
      }

      async function connectWallet() {
        try {
          log("Connecting MetaMask...");
          provider = await discoverMetaMaskProvider();
          if (!provider) {
            log("MetaMask is not available in this browser.");
            return;
          }

          const accounts = await provider.request({ method: "eth_requestAccounts" });
          account = accounts[0];
          await ensureBaseMainnet();
          artifact = await fetch("../token/build/GCAToken.artifact.json").then((response) =>
            response.json()
          );
          const balance = await provider.request({
            method: "eth_getBalance",
            params: [account, "latest"],
          });
          const estimatedGas = await provider.request({
            method: "eth_estimateGas",
            params: [{ from: account, data: artifact.bytecode }],
          });
          updateDeployButton();
          log(`Connected: ${account}`);
          log("Network: Base Mainnet (8453)");
          log(`Balance: ${formatEth(balance)}`);
          log(`Estimated deploy gas: ${Number(BigInt(estimatedGas)).toLocaleString()}`);
          log(`Artifact: ${artifact.contractName}`);
          log(`Supply: ${artifact.token.totalSupplyTokens} ${artifact.token.symbol}`);
        } catch (error) {
          log(`Connect failed: ${error.message || error}`);
        }
      }

      async function waitForReceipt(txHash) {
        for (let attempt = 1; attempt <= 120; attempt += 1) {
          const receipt = await provider.request({
            method: "eth_getTransactionReceipt",
            params: [txHash],
          });
          if (receipt) {
            return receipt;
          }

          log(`Waiting for receipt... ${attempt}/120`);
          await sleep(2000);
        }

        throw new Error("Transaction was submitted, but no receipt was found after 240 seconds.");
      }

      async function deployToken() {
        try {
          if (!account || !artifact) {
            log("Connect MetaMask first.");
            return;
          }
          if (confirmationInput.value !== CONFIRMATION_PHRASE) {
            log("Type the mainnet confirmation phrase first.");
            return;
          }

          await ensureBaseMainnet();
          log("Requesting MetaMask MAINNET transaction confirmation...");
          const txHash = await provider.request({
            method: "eth_sendTransaction",
            params: [{ from: account, data: artifact.bytecode }],
          });
          log(`Transaction: ${txHash}`);
          log(`Explorer: https://basescan.org/tx/${txHash}`);
          const receipt = await waitForReceipt(txHash);
          if (receipt.status !== "0x1") {
            throw new Error(`Transaction failed with status ${receipt.status}`);
          }

          deployedContractAddress = receipt.contractAddress;
          watchButton.disabled = false;
          log(`Contract: ${deployedContractAddress}`);
          log(`Token explorer: https://basescan.org/address/${deployedContractAddress}`);
        } catch (error) {
          log(`Deploy failed: ${error.message || error}`);
        }
      }

      async function watchGcaToken() {
        try {
          if (!provider) {
            provider = await discoverMetaMaskProvider();
          }
          if (!provider) {
            log("MetaMask is not available in this browser.");
            return;
          }
          if (!deployedContractAddress) {
            log("Deploy the mainnet token first.");
            return;
          }

          await ensureBaseMainnet();
          const wasAdded = await provider.request({
            method: "wallet_watchAsset",
            params: {
              type: "ERC20",
              options: {
                address: deployedContractAddress,
                symbol: "GCA",
                decimals: 18,
              },
            },
          });
          log(wasAdded ? "MetaMask token add request accepted." : "MetaMask token add request rejected.");
        } catch (error) {
          log(`Add token failed: ${error.message || error}`);
        }
      }

      log("Script loaded.");
    </script>
  </body>
</html>
