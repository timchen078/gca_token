    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8f5;
        --ink: #151817;
        --muted: #5e6763;
        --line: #dfe4dd;
        --panel: #ffffff;
        --soft: #eef3ef;
        --red: #d71920;
        --blue: #1557d7;
      }
      * { box-sizing: border-box; }
      body { margin: 0; color: var(--ink); background: var(--bg); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.5; }
      a { color: var(--blue); text-decoration: none; }
      a:hover { text-decoration: underline; }
      .shell { width: min(1040px, calc(100% - 32px)); margin: 0 auto; }
      header { position: sticky; top: 0; z-index: 3; border-bottom: 1px solid var(--line); background: rgba(247, 248, 245, 0.95); backdrop-filter: blur(16px); }
      nav { min-height: 68px; display: flex; align-items: center; justify-content: space-between; gap: 18px; }
      .brand { display: inline-flex; align-items: center; gap: 10px; color: var(--ink); font-weight: 850; }
      .brand img { width: 34px; height: 34px; }
      .nav-links { display: flex; align-items: center; gap: 16px; font-size: 14px; }
      main { padding: 42px 0 64px; }
      h1, h2, h3, p { margin-top: 0; }
      h1 { margin-bottom: 14px; font-size: 64px; line-height: 1; letter-spacing: 0; }
      h2 { margin-bottom: 12px; font-size: 22px; letter-spacing: 0; }
      h3 { margin-bottom: 10px; font-size: 16px; letter-spacing: 0; }
      .lead { max-width: 760px; color: var(--muted); font-size: 17px; }
      .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin: 22px 0; }
      .button { min-height: 40px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--line); border-radius: 6px; background: var(--panel); color: var(--ink); padding: 9px 13px; font: inherit; font-weight: 750; cursor: pointer; }
      .button.primary { border-color: var(--red); background: var(--red); color: #fff; }
      .status { border-left: 3px solid var(--red); background: #fff0f0; padding: 12px 14px; }
      .data-root { display: grid; gap: 14px; }
      .data-section { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 18px; }
      .data-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px 18px; }
      .data-row { min-width: 0; border-top: 1px solid var(--line); padding-top: 10px; }
      .data-key { display: block; color: var(--muted); font-size: 12px; font-weight: 780; overflow-wrap: anywhere; }
      .data-value { display: block; margin-top: 4px; font-weight: 650; overflow-wrap: anywhere; white-space: pre-wrap; }
      .data-list { display: grid; gap: 10px; margin: 0; padding: 0; list-style: none; }
      .data-list > li { border-left: 2px solid var(--line); padding-left: 12px; }
      details { margin-top: 18px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 14px; }
      summary { cursor: pointer; font-weight: 780; }
      pre { max-height: 520px; overflow: auto; margin: 14px 0 0; border-radius: 6px; background: #111318; color: #f5f6f7; padding: 16px; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
      footer { border-top: 1px solid var(--line); padding: 24px 0; color: var(--muted); font-size: 14px; }
      @media (max-width: 720px) { h1 { font-size: 40px; } .data-grid { grid-template-columns: 1fr; } }
    </style>
      <link rel="stylesheet" href="assets/gca-site.css?v=20260711">
    <script src="assets/gca-site.js?v=20260711" defer></script>
  </head>
  <body>
    <header>
      <nav class="shell" aria-label="Primary">
        <a class="brand" href="index.html" aria-label="GCA home">
          <img src="assets/gca-logo.svg" alt="GCA logo">
          <span>GCA</span>
        </a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="verify.html">Verify</a>
          <a href="site-map.html">Site Map</a>
        </div>
      </nav>
    </header>
    <main class="shell" id="main-content">
      <p class="lead" id="sourceLabel">Official public data</p>
      <h1 id="pageTitle">GCA Data</h1>
      <p class="lead">This page presents an official machine-readable GCA file in a format that is easier to review.</p>
      <div class="toolbar">
        <a class="button primary" id="readablePage" href="site-map.html">Open related page</a>
        <a class="button" id="rawLink" href="#" data-raw-json>Raw JSON</a>
        <button class="button" id="copyJson" type="button">Copy JSON</button>
      </div>
      <p class="status" id="status" role="status">Loading official data...</p>
      <div class="data-root" id="dataRoot" aria-live="polite"></div>
      <details id="rawPanel">
        <summary>Raw data</summary>
        <pre id="rawOutput"></pre>
      </details>
    </main>
    <footer>
      <div class="shell">GCA | Go China Access · Official public data viewer</div>
    </footer>
    <script>
      (() => {
        "use strict";
        const params = new URLSearchParams(window.location.search);
        const fallback = new URL("project.json", document.baseURI);
        let source;
        try {
          source = new URL(params.get("source") || fallback.href, document.baseURI);
        } catch {
          source = fallback;
        }

        const allowedProtocol = source.protocol === "https:" || source.protocol === "http:" || source.protocol === "file:";
        const sameOrigin = window.location.protocol === "file:" || source.origin === window.location.origin;
        if (!allowedProtocol || !sameOrigin || !source.pathname.endsWith(".json")) source = fallback;

        const fileName = source.pathname.split("/").pop() || "project.json";
        const title = fileName.replace(/\.json$/i, "").split("-").map((part) => part ? part[0].toUpperCase() + part.slice(1) : part).join(" ");
        const readable = new URL(source.href);
        readable.pathname = readable.pathname.replace(/\.json$/i, ".html");
        readable.search = "";
        readable.hash = "";

        document.getElementById("pageTitle").textContent = title;
        document.getElementById("sourceLabel").textContent = fileName;
        document.getElementById("rawLink").href = source.href;
        document.getElementById("readablePage").href = readable.href;

        const keyLabel = (key) => String(key)
          .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
          .replace(/[-_]+/g, " ")
          .replace(/^./, (char) => char.toUpperCase());

        const appendPrimitive = (container, value) => {
          const output = document.createElement("span");
          output.className = "data-value";
          if (typeof value === "boolean") output.textContent = value ? "Yes" : "No";
          else if (value === null) output.textContent = "Not provided";
          else output.textContent = String(value);
          if (typeof value === "string" && /^https:\/\//i.test(value)) {
            const link = document.createElement("a");
            link.href = value;
            link.textContent = value;
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            output.replaceChildren(link);
          }
          container.append(output);
        };

        const renderValue = (container, value, depth = 0) => {
          if (Array.isArray(value)) {
            const list = document.createElement("ul");
            list.className = "data-list";
            value.forEach((item) => {
              const listItem = document.createElement("li");
              if (item && typeof item === "object") renderValue(listItem, item, depth + 1);
              else appendPrimitive(listItem, item);
              list.append(listItem);
            });
            container.append(list);
            return;
          }

          if (value && typeof value === "object") {
            const grid = document.createElement("div");
            grid.className = depth === 0 ? "data-root" : "data-grid";
            Object.entries(value).forEach(([key, item]) => {
              const row = document.createElement(depth === 0 ? "section" : "div");
              row.className = depth === 0 ? "data-section" : "data-row";
              const heading = document.createElement(depth === 0 ? "h2" : "span");
              heading.className = depth === 0 ? "" : "data-key";
              heading.textContent = keyLabel(key);
              row.append(heading);
              renderValue(row, item, depth + 1);
              grid.append(row);
            });
            container.append(grid);
            return;
          }

          appendPrimitive(container, value);
        };

        fetch(source.href, { headers: { Accept: "application/json" } })
          .then((response) => {
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
          })
          .then((payload) => {
            const raw = JSON.stringify(payload, null, 2);
            document.getElementById("status").hidden = true;
            document.getElementById("rawOutput").textContent = raw;
            renderValue(document.getElementById("dataRoot"), payload);
            document.getElementById("copyJson").addEventListener("click", async (event) => {
              await navigator.clipboard.writeText(raw);
              event.currentTarget.textContent = "Copied";
              window.setTimeout(() => { event.currentTarget.textContent = "Copy JSON"; }, 1500);
            });
          })
          .catch(() => {
            const status = document.getElementById("status");
            status.textContent = "This data file could not be loaded. Open the raw file or return to the site map.";
          });
      })();
    </script>
  </body>
</html>
