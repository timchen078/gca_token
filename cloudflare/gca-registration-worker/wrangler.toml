name = "gca-registration-api"
main = "src/worker.mjs"
compatibility_date = "2026-05-19"
workers_dev = true

[vars]
ALLOWED_ORIGINS = "https://gcagochina.com,https://www.gcagochina.com,http://127.0.0.1:8787,http://localhost:8787,http://127.0.0.1:8799,http://localhost:8799"
CONTACT_EMAIL = "GCAgochina@outlook.com"

[[d1_databases]]
binding = "REGISTRATION_DB"
database_name = "gca_registration"
database_id = "REPLACE_WITH_CLOUDFLARE_D1_DATABASE_ID"
preview_database_id = "REPLACE_WITH_CLOUDFLARE_D1_PREVIEW_DATABASE_ID"
migrations_dir = "migrations"
