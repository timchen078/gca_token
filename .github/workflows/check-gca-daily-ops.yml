name: Check GCA Daily Ops

on:
  workflow_dispatch:
  schedule:
    - cron: "29 4 * * *"
  push:
    branches:
      - main
    paths:
      - "tools/run_gca_daily_ops.py"
      - "tools/build_gca_operator_digest.py"
      - "tools/check_public_site.py"
      - "tools/check_gca_registration_api.py"
      - ".github/workflows/check-gca-daily-ops.yml"

permissions:
  contents: read

concurrency:
  group: gca-daily-ops-check
  cancel-in-progress: true

jobs:
  check:
    name: Check public GCA daily ops
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TLS certificate bundle
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install certifi

      - name: Check public daily ops surface
        shell: bash
        run: |
          set -euo pipefail

          export SSL_CERT_FILE="$(python -c 'import certifi; print(certifi.where())')"
          DAILY_OPS_ARGS=(
            --timeout 30
            --summary-output /tmp/gca_daily_ops_summary.json
            --build-digest
            --digest-output /tmp/gca_operator_digest.md
            --digest-json-output /tmp/gca_operator_digest.json
          )

          for attempt in {1..20}; do
            if python tools/run_gca_daily_ops.py "${DAILY_OPS_ARGS[@]}"; then
              exit 0
            fi

            echo "GCA public daily ops check is not ready yet; retrying in 15 seconds (${attempt}/20)."
            sleep 15
          done

          python tools/run_gca_daily_ops.py "${DAILY_OPS_ARGS[@]}"

      - name: Upload daily ops artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gca-public-daily-ops
          if-no-files-found: ignore
          retention-days: 14
          path: |
            /tmp/gca_daily_ops_summary.json
            /tmp/gca_operator_digest.md
            /tmp/gca_operator_digest.json
