name: Check GCA Registration API

on:
  workflow_dispatch:
  schedule:
    - cron: "43 3 * * *"
  push:
    branches:
      - main
    paths:
      - "tools/check_gca_registration_api.py"
      - ".github/workflows/check-gca-registration-api.yml"

permissions:
  contents: read

concurrency:
  group: gca-registration-api-check
  cancel-in-progress: true

jobs:
  check:
    name: Check live registration API public surface
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TLS certificate bundle
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install certifi

      - name: Check live registration API public surface
        shell: bash
        run: |
          set -euo pipefail

          export SSL_CERT_FILE="$(python -c 'import certifi; print(certifi.where())')"

          for attempt in {1..20}; do
            if python tools/check_gca_registration_api.py --public-only --timeout 30; then
              exit 0
            fi

            echo "Live registration API is not ready yet; retrying in 15 seconds (${attempt}/20)."
            sleep 15
          done

          python tools/check_gca_registration_api.py --public-only --timeout 30
