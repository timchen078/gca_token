name: Check GCA Public Site

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches:
      - main
    paths:
      - "tools/check_public_site.py"
      - ".github/workflows/check-public-site.yml"

permissions:
  contents: read

concurrency:
  group: gca-public-site-check
  cancel-in-progress: true

jobs:
  check:
    name: Check live gcagochina.com identity
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TLS certificate bundle
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install certifi

      - name: Check live public site
        shell: bash
        run: python tools/check_public_site.py --timeout 30
